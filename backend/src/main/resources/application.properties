# =============================================================================
# CONTROLE FINANCEIRO SIMPLES - Configuracao da aplicacao
# =============================================================================
spring.application.name=financas-simples

# -----------------------------------------------------------------------------
# Banco de dados PostgreSQL
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/financa_db
spring.datasource.username=macbook
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------------
# Cria/atualiza as tabelas automaticamente na primeira execucao
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------------
# JSON (datas em formato ISO e fuso de Sao Paulo)
# -----------------------------------------------------------------------------
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# -----------------------------------------------------------------------------
# Servidor
# -----------------------------------------------------------------------------
server.port=8080

# -----------------------------------------------------------------------------
# JWT (token de login)
# -----------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:chave-secreta-para-desenvolvimento-troque-em-producao-256-bits-ok}
# 24 horas em milissegundos
app.jwt.expiration=86400000

# -----------------------------------------------------------------------------
# Swagger / OpenAPI
# -----------------------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html

# -----------------------------------------------------------------------------
# Logs
# -----------------------------------------------------------------------------
logging.level.com.financas=DEBUG
