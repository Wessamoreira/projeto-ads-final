# =============================================================================
# Configuracao usada SOMENTE nos testes automatizados.
# Usa banco H2 em memoria, para nao depender de um PostgreSQL rodando.
# =============================================================================

# Banco H2 em memoria, em modo de compatibilidade com PostgreSQL
spring.datasource.url=jdbc:h2:mem:financas_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Cria as tabelas a partir das entidades a cada execucao de teste
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Segredo JWT fixo para os testes (>= 256 bits)
app.jwt.secret=segredo-de-teste-apenas-para-rodar-os-testes-automatizados-256-bits
app.jwt.expiration=3600000

logging.level.com.financas=WARN
